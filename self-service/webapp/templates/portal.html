<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Service Access Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            color: #333;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        input[type="number"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
        }
        input[type="number"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        textarea {
            resize: vertical;
            min-height: 80px;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .submit-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .reset-btn {
            background: #f0f0f0;
            color: #333;
        }
        .reset-btn:hover {
            background: #e0e0e0;
        }
        .alert {
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }
        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }
        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 25px;
            font-size: 13px;
            color: #555;
        }
        .info-box strong {
            color: #333;
        }
        .loading-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .submit-btn:disabled .loading-spinner {
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Self-Service Access</h1>
        <p class="subtitle">Request temporary access to the network</p>

        <div id="alert" class="alert"></div>

        <div class="info-box">
            <strong>Your IP:</strong> <span id="client-ip">detecting...</span><br>
            <strong>Max duration:</strong> 24 hours
        </div>

        <form id="requestForm">
            <div class="form-group">
                <label for="duration">Duration (minutes) *</label>
                <input
                    type="number"
                    id="duration"
                    name="duration_minutes"
                    min="1"
                    max="1440"
                    value="60"
                    required
                    placeholder="e.g., 60"
                >
            </div>

            <div class="form-group">
                <label for="reason">Reason (optional)</label>
                <textarea
                    id="reason"
                    name="reason"
                    placeholder="Why do you need access?"
                ></textarea>
            </div>

            <div class="button-group">
                <button type="submit" class="submit-btn">
                    <span class="loading-spinner"></span>
                    Submit Request
                </button>
                <button type="reset" class="reset-btn">Clear</button>
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById("requestForm");
        const alert = document.getElementById("alert");
        const submitBtn = form.querySelector(".submit-btn");

        // Detect and display client IP from the server (avoids third-party calls)
        async function detectIP() {
            try {
                const response = await fetch("/api/whoami");
                const data = await response.json();
                document.getElementById("client-ip").textContent = data.ip;
            } catch (e) {
                document.getElementById("client-ip").textContent = "detected on submission";
            }
        }
        detectIP();

        function showAlert(message, type) {
            alert.textContent = message;
            alert.className = `alert ${type}`;
            alert.style.display = "block";
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            alert.style.display = "none";

            const duration = parseInt(document.getElementById("duration").value);
            const reason = document.getElementById("reason").value.trim();

            if (!duration || duration < 1 || duration > 1440) {
                showAlert("⚠️ Duration must be between 1 and 1440 minutes", "error");
                return;
            }

            submitBtn.disabled = true;

            try {
                const response = await fetch("/api/request", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                    },
                    body: JSON.stringify({
                        duration_minutes: duration,
                        reason: reason,
                    }),
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert(
                        `✅ ${data.message}\nAccess until: ${new Date(data.expires_at).toLocaleString()}`,
                        "success"
                    );
                    form.reset();
                } else {
                    showAlert(`❌ ${data.error || "Request failed"}`, "error");
                }
            } catch (error) {
                showAlert(`❌ Network error: ${error.message}`, "error");
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
