worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    # Docker embedded DNS server
    resolver 127.0.0.11 valid=10s;
    resolver_timeout 5s;

    server {
        listen 80;
        server_name polysquid-test.uit.no;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name polysquid-test.uit.no;

        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location = /outside-subnet.html {
            root /usr/share/nginx/html;
            add_header Cache-Control "no-store";
        }

        location / {
            allow 129.242.0.0/16;
            deny all;
            error_page 403 = /outside-subnet.html;

            # Use a variable to force runtime DNS resolution instead of startup time
            set $upstream http://polysquid-self-service-app:5000;
            proxy_pass $upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_send_timeout 10s;
            proxy_read_timeout 10s;
        }
    }
}
