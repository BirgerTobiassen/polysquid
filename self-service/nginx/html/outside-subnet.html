<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Access Restricted</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f8fa;
      color: #1f2937;
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      max-width: 700px;
      width: 100%;
      background: #ffffff;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }
    h1 {
      margin-top: 0;
      font-size: 1.4rem;
    }
    code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 6px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Portal Access Is Restricted</h1>
    <p>This self-service portal is only available from IP addresses in subnet <code>129.242.0.0/16</code>.</p>
    <p>Please connect from a network address within that subnet and try again.</p>
  </main>
</body>
</html>
